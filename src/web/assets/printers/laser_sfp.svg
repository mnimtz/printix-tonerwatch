<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke="#231F20" stroke-width="2.2" stroke-linecap="round"
     stroke-linejoin="round" role="img" aria-label="Laser single-function printer">
  <title>Laser single-function printer</title>
  <!-- Top paper tray with folded sheets -->
  <path d="M18 12 h28 l-2 6 h-24 z" stroke="#00A0FB"/>
  <!-- Printer body -->
  <rect x="10" y="18" width="44" height="24" rx="2"/>
  <!-- Control panel -->
  <rect x="14" y="22" width="14" height="4" rx="1" stroke="#00A0FB"/>
  <circle cx="46" cy="24" r="1.5" fill="#00A0FB" stroke="none"/>
  <!-- Output slot -->
  <line x1="14" y1="34" x2="50" y2="34"/>
  <!-- Output tray + printed sheet -->
  <path d="M18 42 h28 v6 h-28 z"/>
  <path d="M22 48 h20" stroke="#00A0FB"/>
</svg>
