<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke="#231F20" stroke-width="2.2" stroke-linecap="round"
     stroke-linejoin="round" role="img" aria-label="Production press">
  <title>Production press</title>
  <!-- Feeder module (left) -->
  <rect x="2"  y="18" width="12" height="30" rx="2"/>
  <line x1="5"  y1="24" x2="11" y2="24" stroke="#00A0FB"/>
  <line x1="5"  y1="28" x2="11" y2="28" stroke="#00A0FB"/>
  <!-- Print engine (main) with control panel -->
  <rect x="14" y="14" width="30" height="34" rx="2"/>
  <rect x="18" y="18" width="22" height="10" rx="1" stroke="#00A0FB"/>
  <circle cx="22" cy="36" r="2"/>
  <circle cx="30" cy="36" r="2"/>
  <circle cx="38" cy="36" r="2"/>
  <!-- Finisher / stacker (right) -->
  <rect x="44" y="20" width="18" height="28" rx="2"/>
  <line x1="48" y1="30" x2="58" y2="30" stroke="#00A0FB"/>
  <line x1="48" y1="34" x2="58" y2="34" stroke="#00A0FB"/>
  <line x1="48" y1="38" x2="58" y2="38" stroke="#00A0FB"/>
  <!-- Ground line + feet -->
  <line x1="2"  y1="48" x2="62" y2="48"/>
  <line x1="6"  y1="48" x2="6"  y2="58"/>
  <line x1="30" y1="48" x2="30" y2="58"/>
  <line x1="58" y1="48" x2="58" y2="58"/>
</svg>
