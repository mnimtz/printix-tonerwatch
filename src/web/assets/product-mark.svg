<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img"
     aria-label="Printix Toner Radar">
  <title>Printix Toner Radar</title>
  <!-- Rounded square badge in Tungsten primary blue -->
  <rect width="64" height="64" rx="12" fill="#002854"/>
  <!-- Signature 65° rhombus accent, Print & Workplace pillar gradient -->
  <defs>
    <linearGradient id="pillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00EB86"/>
      <stop offset="1" stop-color="#00A0FB"/>
    </linearGradient>
  </defs>
  <polygon points="42,4 60,4 46,60 28,60" fill="url(#pillar)" opacity="0.9"/>
  <!-- Stylised "P" glyph in white — bowl uses fill-rule to knock out its hole -->
  <path fill="#FFFFFF" fill-rule="evenodd" d="
    M14 12 h14 a12 12 0 0 1 0 24 h-8 v16 h-6 z
    M20 18 v12 h8 a6 6 0 0 0 0 -12 z
  "/>
</svg>
