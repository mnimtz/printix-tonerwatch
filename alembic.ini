# Alembic configuration.
#
# The runtime overrides `sqlalchemy.url` with the effective DATABASE_URL
# before every command (see src/db.py :: _alembic_config), so the value
# below is only a placeholder used when Alembic runs from the CLI without
# environment overrides.

[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///data/tonerwatch.sqlite
prepend_sys_path = .
timezone = UTC
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
