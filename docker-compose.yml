services:
  toner-radar:
    build: .
    image: ghcr.io/mnimtz/tonerwatch:local
    container_name: toner-radar
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - tonerwatch-data:/data
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8080
      DB_PATH: /data/tonerwatch.sqlite
      # SESSION_SECRET is derived from FERNET_KEY on first start when unset.
      # Set explicitly if you want a stable value independent of the DB key.
      # SESSION_SECRET: "change-me"

volumes:
  tonerwatch-data:
